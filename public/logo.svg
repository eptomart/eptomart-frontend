<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 148" role="img" aria-label="Eptomart — Premium Products. Trusted Quality.">
  <defs>
    <!-- Cart / e gradient (yellow-amber at top → deep orange at bottom) -->
    <linearGradient id="cg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#F5C840"/>
      <stop offset="50%" stop-color="#F5A020"/>
      <stop offset="100%" stop-color="#F06E10"/>
    </linearGradient>
    <!-- Leaf gradient (yellow-green → dark green) -->
    <linearGradient id="lg" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E840"/>
      <stop offset="100%" stop-color="#2A8B20"/>
    </linearGradient>
    <!-- "epto" text gradient -->
    <linearGradient id="eg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5CC840"/>
      <stop offset="100%" stop-color="#3DAA28"/>
    </linearGradient>
    <!-- "mart" text gradient -->
    <linearGradient id="mg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5A020"/>
      <stop offset="100%" stop-color="#F06810"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!--  ICON MARK  (fits in 0–130 x 0–148 area)  -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Cart handle – horizontal bar top-left -->
  <line x1="10" y1="50" x2="40" y2="50"
        stroke="url(#cg)" stroke-width="10" stroke-linecap="round"/>

  <!-- Circuit antenna lines (3 stems, upper-left area) -->
  <line x1="30" y1="48" x2="16" y2="22"
        stroke="#F5A825" stroke-width="4" stroke-linecap="round"/>
  <circle cx="14" cy="18" r="4.5" fill="#F5A825"/>

  <line x1="41" y1="43" x2="36" y2="15"
        stroke="#F5A825" stroke-width="4" stroke-linecap="round"/>
  <circle cx="35" cy="11" r="4.5" fill="#F5A825"/>

  <line x1="52" y1="40" x2="52" y2="12"
        stroke="#F5A825" stroke-width="4" stroke-linecap="round"/>
  <circle cx="52" cy="8" r="4.5" fill="#F5A825"/>

  <!-- Green leaf at top of cart -->
  <path d="M 58,40
           C 59,26 72,22 84,28
           C 83,41 70,46 58,40 Z"
        fill="url(#lg)"/>
  <path d="M 58,40 Q 71,32 84,28"
        stroke="#228020" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!--
    "e" + cart body
    Centre: (65, 82), outer radius 36
    Arc sweeps 270° counterclockwise, opening on right side
    Start (318°): (65+36·cos318°, 82+36·sin318°) = (65+27, 82-24) = (92,58)
    End  (48°):   (65+36·cos48°,  82+36·sin48°)  = (65+24, 82+27) = (89,109)
  -->
  <path d="M 92,58 A 36,36 0 1,0 89,109"
        stroke="url(#cg)" stroke-width="15" fill="none"
        stroke-linecap="round"/>
  <!-- Middle crossbar of "e" (cart shelf) -->
  <line x1="30" y1="82" x2="88" y2="82"
        stroke="url(#cg)" stroke-width="15" stroke-linecap="round"/>

  <!-- Cart base -->
  <line x1="38" y1="120" x2="100" y2="120"
        stroke="url(#cg)" stroke-width="10" stroke-linecap="round"/>

  <!-- Wheels -->
  <circle cx="50"  cy="132" r="9" fill="url(#cg)"/>
  <circle cx="90"  cy="132" r="9" fill="url(#cg)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!--  WORDMARK  (starts at x=118)               -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- "epto" in green -->
  <text x="118" y="102"
        font-family="'Inter', 'Poppins', 'Nunito', Arial, sans-serif"
        font-size="68" font-weight="800" letter-spacing="-1"
        fill="url(#eg)">epto</text>

  <!-- "mart" in orange -->
  <text x="310" y="102"
        font-family="'Inter', 'Poppins', 'Nunito', Arial, sans-serif"
        font-size="68" font-weight="800" letter-spacing="-1"
        fill="url(#mg)">mart</text>

  <!-- Tagline -->
  <text x="120" y="126"
        font-family="'Inter', Arial, sans-serif"
        font-size="13.5" font-weight="400" letter-spacing="0.3"
        fill="#8899AA">Premium Products. Trusted Quality.</text>
</svg>
