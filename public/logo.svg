<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="Eptomart">
  <defs>
    <linearGradient id="logoGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="logoOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="0" width="72" height="72" rx="14" ry="14" fill="url(#iconBg)"/>

  <!-- Circuit dots (top-left area) -->
  <circle cx="10" cy="10" r="1.5" fill="#22C55E" opacity="0.6"/>
  <circle cx="18" cy="10" r="1.5" fill="#22C55E" opacity="0.4"/>
  <line x1="11.5" y1="10" x2="16.5" y2="10" stroke="#22C55E" stroke-width="0.8" opacity="0.4"/>
  <line x1="10" y1="11.5" x2="10" y2="16" stroke="#22C55E" stroke-width="0.8" opacity="0.3"/>

  <!-- Circuit dots (bottom-right) -->
  <circle cx="62" cy="62" r="1.5" fill="#F97316" opacity="0.6"/>
  <circle cx="54" cy="62" r="1.5" fill="#F97316" opacity="0.4"/>
  <line x1="55.5" y1="62" x2="60.5" y2="62" stroke="#F97316" stroke-width="0.8" opacity="0.4"/>
  <line x1="62" y1="54" x2="62" y2="60.5" stroke="#F97316" stroke-width="0.8" opacity="0.3"/>

  <!-- Shopping cart body -->
  <path d="M18 24 L21 24 L25 43 L52 43 L56 30 L24 30"
        stroke="url(#cartGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cart handle line -->
  <line x1="24" y1="30" x2="56" y2="30" stroke="url(#cartGrad)" stroke-width="0" fill="none"/>
  <!-- Cart items lines -->
  <line x1="28" y1="34" x2="52" y2="34" stroke="#22C55E" stroke-width="1.2" opacity="0.5"/>
  <line x1="29" y1="38" x2="51" y2="38" stroke="#22C55E" stroke-width="1.2" opacity="0.5"/>
  <!-- Cart wheels -->
  <circle cx="30" cy="47" r="3" fill="#F97316"/>
  <circle cx="46" cy="47" r="3" fill="#F97316"/>

  <!-- 'e' letter inside cart area -->
  <text x="36" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="auto">e</text>

  <!-- Green leaf (top right of cart) -->
  <path d="M51 20 Q58 14 64 20 Q58 26 51 20 Z" fill="#22C55E"/>
  <line x1="51" y1="20" x2="64" y2="20" stroke="#16A34A" stroke-width="0.8"/>
  <line x1="57.5" y1="14" x2="57.5" y2="26" stroke="#16A34A" stroke-width="0.6" opacity="0.6"/>

  <!-- Wordmark: "epto" in green -->
  <text x="88" y="38" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="800"
        fill="url(#logoGreen)" letter-spacing="-0.5">epto</text>
  <!-- Wordmark: "mart" in orange -->
  <text x="158" y="38" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="800"
        fill="url(#logoOrange)" letter-spacing="-0.5">mart</text>

  <!-- Tagline -->
  <text x="88" y="56" font-family="'Inter', Arial, sans-serif" font-size="9" font-weight="400"
        fill="#64748B" letter-spacing="1.5">PREMIUM PRODUCTS. TRUSTED QUALITY.</text>
</svg>
