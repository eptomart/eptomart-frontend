<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1729"/>
      <stop offset="100%" stop-color="#0F2040"/>
    </linearGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#F5C840"/>
      <stop offset="50%" stop-color="#F5A020"/>
      <stop offset="100%" stop-color="#F06E10"/>
    </linearGradient>
    <linearGradient id="lg" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E840"/>
      <stop offset="100%" stop-color="#2A8B20"/>
    </linearGradient>
  </defs>

  <!-- Navy background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- ═══ SHOPPING CART "e" ICON ═══ -->
  <!--
    Layout: icon centered, slightly left
    Cart center: (256, 280)
    "e" outer radius: 128
    "e" inner radius: 78 (stroke width 50)
    Opening angle on right: from ~320° to ~40° (gap = 80°)
  -->

  <!-- Cart handle – horizontal bar extending left from top of "e" -->
  <line x1="90" y1="178" x2="174" y2="178"
        stroke="url(#cg)" stroke-width="38" stroke-linecap="round"/>

  <!-- Circuit antenna lines (3 stems going upper-left with circle tips) -->
  <line x1="128" y1="170" x2="88" y2="96"
        stroke="#F5A825" stroke-width="14" stroke-linecap="round"/>
  <circle cx="82" cy="84" r="16" fill="#F5A825"/>

  <line x1="158" y1="158" x2="136" y2="74"
        stroke="#F5A825" stroke-width="14" stroke-linecap="round"/>
  <circle cx="131" cy="62" r="16" fill="#F5A825"/>

  <line x1="188" y1="150" x2="186" y2="62"
        stroke="#F5A825" stroke-width="14" stroke-linecap="round"/>
  <circle cx="185" cy="50" r="16" fill="#F5A825"/>

  <!-- Green leaf at top of "e" -->
  <path d="M 215,148
           C 218,110 255,96 295,108
           C 295,145 258,162 215,148 Z"
        fill="url(#lg)"/>
  <!-- Leaf centre vein -->
  <path d="M 215,148 Q 255,124 295,108"
        stroke="#2A7820" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Main "e" body — thick arc (270° sweep, opening on right) + crossbar -->
  <!-- Arc: centre (256,288), r=128, from top-right (318°) CCW 270° to bottom-right (48°) -->
  <!-- 318° point: (256+128·cos318°, 288+128·sin318°) = (256+95, 288-86) = (351,202) -->
  <!-- 48°  point: (256+128·cos48°,  288+128·sin48°)  = (256+86, 288+95) = (342,383) -->
  <path d="M 351,202
           A 128,128 0 1,0 342,383"
        stroke="url(#cg)" stroke-width="52" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Middle crossbar of "e" (cart shelf) -->
  <line x1="130" y1="288" x2="338" y2="288"
        stroke="url(#cg)" stroke-width="52" stroke-linecap="round"/>

  <!-- Cart base line (bottom of "e" to wheels) -->
  <line x1="148" y1="415" x2="362" y2="415"
        stroke="url(#cg)" stroke-width="36" stroke-linecap="round"/>

  <!-- Wheels -->
  <circle cx="188" cy="452" r="34" fill="url(#cg)"/>
  <circle cx="340" cy="452" r="34" fill="url(#cg)"/>
</svg>
