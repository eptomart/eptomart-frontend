<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta name="theme-color" content="#f97316" />
    <meta name="description" content="Eptomart — India's fast, affordable online shopping destination. Shop electronics, fashion, groceries and more." />
    <meta name="keywords" content="eptomart, online shopping, india, ecommerce, buy online" />

    <!-- PWA Meta -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Eptomart" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.png" />

    <!-- Splash screens (iOS) -->
    <meta name="msapplication-TileColor" content="#f97316" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Eptomart — Shop Everything" />
    <meta property="og:description" content="India's fast, affordable online shopping destination" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://eptomart.com" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <title>Eptomart — Shop Everything</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;font-family:monospace;background:#fee2e2;color:#991b1b;border-radius:8px;margin:20px;">' +
          '<h2 style="margin:0 0 10px">JS Error</h2>' +
          '<p style="margin:0 0 5px"><b>' + msg + '</b></p>' +
          '<p style="margin:0;font-size:12px">' + src + ' line:' + line + '</p></div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;font-family:monospace;background:#fef3c7;color:#92400e;border-radius:8px;margin:20px;">' +
          '<h2 style="margin:0 0 10px">Promise Error</h2>' +
          '<p style="margin:0">' + (e.reason?.message || String(e.reason)) + '</p></div>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
