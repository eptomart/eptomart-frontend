<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta name="theme-color" content="#0D1B3E" />
    <meta name="description" content="Eptomart — India's trusted online shopping destination. Buy electronics, fashion, groceries, fresh produce & more. Fast pan-India delivery, GST invoices, verified sellers." />
    <meta name="keywords" content="eptomart, online shopping india, buy online india, ecommerce india, fresh groceries online, koyambedu market online, farmer fresh, indian online store, shop electronics india, fashion online india" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://www.eptomart.com/" />
    <!-- Geo targeting — India -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="language" content="English" />

    <!-- PWA Meta -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Eptomart" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.png" />

    <!-- Open Graph (social sharing preview) -->
    <meta property="og:title" content="Eptomart — Shop Everything" />
    <meta property="og:description" content="India's fast, affordable online shopping destination. Shop electronics, fashion, groceries and more." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.eptomart.com/" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:image" content="https://eptomart.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Eptomart — Premium Products. Trusted Quality." />
    <meta property="og:site_name" content="Eptomart" />
    <!-- Twitter / WhatsApp Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Eptomart — Shop Everything" />
    <meta name="twitter:description" content="India's fast, affordable online shopping destination" />
    <meta name="twitter:image" content="https://eptomart.com/og-image.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <title>Eptomart — Online Shopping India | Buy Fresh, Fashion, Electronics</title>

    <!-- Organization + WebSite JSON-LD — Enables Google Sitelinks Search Box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.eptomart.com/#organization",
          "name": "Eptomart",
          "alternateName": "Eptosi Group",
          "url": "https://www.eptomart.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.eptomart.com/logo-v3.png",
            "width": 512,
            "height": 512
          },
          "sameAs": [],
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer service",
            "email": "eptosicare@gmail.com",
            "availableLanguage": ["English", "Tamil"]
          },
          "areaServed": {
            "@type": "Country",
            "name": "India"
          },
          "description": "Eptomart is India's trusted multi-category online shopping platform by Eptosi Group of Companies. Shop electronics, fashion, groceries, fresh produce and more with fast pan-India delivery."
        },
        {
          "@type": "WebSite",
          "@id": "https://www.eptomart.com/#website",
          "url": "https://www.eptomart.com",
          "name": "Eptomart",
          "description": "India's trusted online shopping destination — electronics, fashion, groceries, fresh produce & more.",
          "publisher": { "@id": "https://www.eptomart.com/#organization" },
          "inLanguage": "en-IN",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://www.eptomart.com/shop?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <!-- KILL all service workers immediately — runs before anything else -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { caches.delete(k); });
        });
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div id="app-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0B1729;z-index:9999;font-family:'Inter',Arial,sans-serif;">
        <!-- Spinning rings -->
        <div style="position:relative;width:200px;height:200px;margin-bottom:40px;">
          <div class="ring ring1"></div>
          <div class="ring ring2"></div>
          <div class="ring ring3"></div>
          <!-- Icon only (no text) inside the rings -->
          <img src="/logo-transparent-trim.png" alt="Eptomart"
               style="position:absolute;inset:0;margin:auto;width:120px;height:auto;object-fit:contain;animation:logoIn 0.6s ease-out both;"
               onerror="this.src='/icons/icon-192x192.png';" />
        </div>
        <!-- Full logo with text fades up below rings -->
        <div style="animation:fadeUp 0.7s 0.4s ease-out both;text-align:center;padding:0 20px;">
          <img src="/logo-wide.png" alt="Eptomart"
               style="height:44px;width:auto;display:block;margin:0 auto;"
               onerror="this.style.display='none'" />
        </div>
        <!-- Progress bar -->
        <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.08);">
          <div class="progress-bar"></div>
        </div>
        <style>
          .ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;}
          .ring1{border-top-color:#f4941c;border-right-color:#f4941c;animation:spin 1.2s linear infinite;}
          .ring2{inset:12px;border-top-color:#6DB651;border-left-color:#6DB651;animation:spin 1.8s linear infinite reverse;}
          .ring3{inset:24px;border-bottom-color:rgba(244,148,28,0.4);animation:spin 2.4s linear infinite;}
          @keyframes spin{to{transform:rotate(360deg)}}
          @keyframes logoIn{from{opacity:0;transform:scale(0.6)}to{opacity:1;transform:scale(1)}}
          @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
          .progress-bar{height:100%;width:0;background:linear-gradient(90deg,#6DB651,#f4941c);border-radius:2px;animation:load 2.5s ease-in-out forwards;}
          @keyframes load{0%{width:0}60%{width:70%}90%{width:90%}100%{width:100%}}
        </style>
      </div>
    </div>

    <!-- Catch raw JS errors (syntax, reference errors in non-React code) -->
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var root = document.getElementById('root');
        if (root) root.innerHTML =
          '<div style="padding:20px;font-family:monospace;background:#fee2e2;color:#991b1b;border-radius:8px;margin:20px;">' +
          '<h2 style="margin:0 0 10px">JS Error</h2>' +
          '<p style="margin:0 0 5px"><b>' + (msg || 'Unknown error') + '</b></p>' +
          '<p style="margin:0;font-size:12px">' + (src || '') + ' line:' + line + '</p>' +
          '<button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;background:#f97316;color:white;border:none;border-radius:6px;cursor:pointer">Reload</button>' +
          '</div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var root = document.getElementById('root');
        if (root && root.children.length <= 1) {
          root.innerHTML =
            '<div style="padding:20px;font-family:monospace;background:#fef3c7;color:#92400e;border-radius:8px;margin:20px;">' +
            '<h2 style="margin:0 0 10px">Promise Error</h2>' +
            '<p style="margin:0">' + ((e.reason && e.reason.message) || String(e.reason)) + '</p>' +
            '<button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;background:#f97316;color:white;border:none;border-radius:6px;cursor:pointer">Reload</button>' +
            '</div>';
        }
      });
    </script>

    <!-- Keep splash visible for minimum 2s so animation is seen -->
    <script>
      window.__splashStart = Date.now();
      window.__hideSplash = function() {
        var splash = document.getElementById('app-splash');
        if (!splash) return;
        var elapsed = Date.now() - window.__splashStart;
        var delay = Math.max(0, 2000 - elapsed);
        setTimeout(function() {
          splash.style.transition = 'opacity 0.4s ease';
          splash.style.opacity = '0';
          setTimeout(function() { splash.style.display = 'none'; }, 400);
        }, delay);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
